services:
  # Postgres is provided by `supabase start` on port 54322 — see ADR 0004.
  # This compose file covers only the services Supabase doesn't ship.

  redis:
    image: redis:7-alpine
    container_name: sab-redis
    ports:
      - '6379:6379'
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - sab-redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20

  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: sab-meilisearch
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: dev-master-key-change-me
    ports:
      - '7700:7700'
    volumes:
      - sab-meilisearch-data:/meili_data

volumes:
  sab-redis-data:
  sab-meilisearch-data:
