name: Security

on:
  schedule:
    - cron: '0 7 * * 1' # Mondays 07:00 UTC
  workflow_dispatch:
  pull_request:
    branches: [main]

jobs:
  audit:
    name: pnpm audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Audit high + critical
        run: pnpm audit --audit-level=high || echo "::warning::pnpm audit surfaced issues — review."

  semgrep:
    name: Semgrep static analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: returntocorp/semgrep:latest

    steps:
      - uses: actions/checkout@v4
      - run: semgrep ci --config=auto --severity=ERROR --severity=WARNING
